<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone HTML/JS Repair Request Form</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            color: #0f172a;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            flex: 1;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="email"], input[type="date"], input[type="time"], textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }
        textarea {
            resize: vertical;
        }
        .file-input-wrapper {
            border: 2px dashed var(--border);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
        }
        .file-input-wrapper:hover {
            border-color: var(--primary);
            background: #f0f9ff;
        }
        .file-input-wrapper input {
            display: none;
        }
        .file-label {
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
        }
        button {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        .alert-box {
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-box {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }
        .error-box {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fee2e2;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Request Repair Form (HTML/JS Test)</h2>
    
    <div id="alert-message" class="alert-box"></div>

    <form id="repair-form">
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name *</label>
                <input type="text" id="first_name" required placeholder="John">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name *</label>
                <input type="text" id="last_name" required placeholder="Doe">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="email">E-Mail Address *</label>
                <input type="email" id="email" required placeholder="john.doe@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Telephone Number *</label>
                <input type="text" id="phone" required placeholder="+1 555-123-4567">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="device_brand">Device Brand *</label>
                <input type="text" id="device_brand" required placeholder="e.g. Apple">
            </div>
            <div class="form-group">
                <label for="device_type">Device Type *</label>
                <input type="text" id="device_type" required placeholder="e.g. Smartphone">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="device_model">Device Model *</label>
                <input type="text" id="device_model" required placeholder="e.g. iPhone 14 Pro">
            </div>
            <div class="form-group">
                <label for="repair_type">Repair Selection *</label>
                <input type="text" id="repair_type" required placeholder="e.g. Display Repair">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="appointment_date">Preferred Date</label>
                <input type="date" id="appointment_date">
            </div>
            <div class="form-group">
                <label for="appointment_time">Preferred Time</label>
                <input type="time" id="appointment_time">
            </div>
        </div>

        <div class="form-group">
            <label for="issue_description">Your Message / Issue Description *</label>
            <textarea id="issue_description" rows="4" required placeholder="Briefly describe the damage or symptoms..."></textarea>
        </div>

        <div class="form-group">
            <label>Upload Photo of Damage (Optional)</label>
            <div class="file-input-wrapper" onclick="document.getElementById('photo').click()">
                <span class="file-label" id="file-chosen-text">Click here to choose an image...</span>
                <input type="file" id="photo" accept="image/*" onchange="updateFileName(this)">
            </div>
        </div>

        <button type="submit" id="submit-btn">Submit Request</button>
    </form>
</div>

<script>
function updateFileName(input) {
    const textSpan = document.getElementById('file-chosen-text');
    if (input.files && input.files.length > 0) {
        textSpan.textContent = "Selected: " + input.files[0].name;
    } else {
        textSpan.textContent = "Click here to choose an image...";
    }
}

document.getElementById('repair-form').addEventListener('submit', async function (event) {
    event.preventDefault();

    const alertMessage = document.getElementById('alert-message');
    const submitBtn = document.getElementById('submit-btn');

    alertMessage.style.display = 'none';
    alertMessage.className = 'alert-box';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    // --- CONFIGURATION ---
    const SHOP_ID = "07e4dc10-abac-49f0-8a9a-5424fd174bb3"; // Your actual active shop/user ID
    const API_URL = "https://chaps-backslid-obedient.ngrok-free.dev/api/public/widget/request";

    // Gather text values
    const firstName = document.getElementById('first_name').value.trim();
    const lastName = document.getElementById('last_name').value.trim();
    const customerName = `${firstName} ${lastName}`.trim();

    // Create Multipart FormData payload
    const formData = new FormData();
    formData.append('shopId', SHOP_ID);
    formData.append('customerName', customerName);
    formData.append('customerEmail', document.getElementById('email').value.trim());
    formData.append('customerPhone', document.getElementById('phone').value.trim());
    formData.append('deviceBrand', document.getElementById('device_brand').value.trim());
    formData.append('deviceType', document.getElementById('device_type').value.trim());
    formData.append('deviceModel', document.getElementById('device_model').value.trim());
    formData.append('repairType', document.getElementById('repair_type').value.trim());
    formData.append('issueDescription', document.getElementById('issue_description').value.trim());

    // Appointment date and time formatting
    const appointmentDate = document.getElementById('appointment_date').value;
    const appointmentTime = document.getElementById('appointment_time').value;
    if (appointmentDate && appointmentTime) {
        const isoDateTime = new Date(`${appointmentDate}T${appointmentTime}`).toISOString();
        formData.append('preferredAppointment', isoDateTime);
    }

    // Photo file
    const fileInput = document.getElementById('photo');
    if (fileInput.files.length > 0) {
        formData.append('photo', fileInput.files[0]);
    }

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: formData // Browser sets Multipart Form Boundary header automatically
        });

        const result = await response.json();

        if (response.ok && result.success) {
            alertMessage.textContent = "Success! The request has been submitted to your dashboard.";
            alertMessage.classList.add('success-box');
            alertMessage.style.display = 'block';
            document.getElementById('repair-form').reset();
            document.getElementById('file-chosen-text').textContent = "Click here to choose an image...";
        } else {
            const errorMsg = result.message || 'Validation failed';
            alertMessage.textContent = `Error: ${errorMsg}`;
            alertMessage.classList.add('error-box');
            alertMessage.style.display = 'block';
        }
    } catch (error) {
        console.error('Fetch error:', error);
        alertMessage.textContent = 'A network error occurred. Please verify your ngrok tunnel is online.';
        alertMessage.classList.add('error-box');
        alertMessage.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Request';
    }
});
</script>

</body>
</html>
