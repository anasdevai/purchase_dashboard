name: Deploy Device Purchased Project

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 🔹 TAILSCALE
      # =========================
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      # =========================
      # 🔹 SSH SETUP
      # =========================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add Known Hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # =========================
      # 🔹 PULL LATEST CODE
      # =========================
      - name: Pull Latest Code
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd ~/DevicePurchased--Project &&
          git pull origin main
          "

      # =========================
      # 🔹 BACKEND
      # =========================
      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd ~/DevicePurchased--Project/backend &&
          if [ ! -f .env ]; then cp .env.docker.example .env; fi &&
          docker-compose down &&
          docker-compose up -d --build &&
          sleep 20 &&
          docker-compose exec -T backend npx prisma migrate status &&
          docker-compose logs --tail=80 backend
          "

      # =========================
      # 🔹 FRONTEND
      # =========================
      - name: Deploy Frontend
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd ~/DevicePurchased--Project/frontend &&
          if [ ! -f .env ]; then cp .env.docker.example .env; fi &&
          docker-compose down &&
          docker-compose up -d --build
          "

      # =========================
      # 🔹 HEALTH CHECKS
      # =========================
      - name: Backend Health Check
        run: |
          sleep 25
          if curl -fsS "http://${{ secrets.SERVER_IP }}:4000/health"; then
            echo "Backend health check passed"
          else
            echo "Backend health check failed. Recent backend logs:"
            ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd ~/DevicePurchased--Project/backend &&
            docker-compose logs --tail=80 backend
            "
            exit 1
          fi

      - name: Frontend Health Check
        run: |
          curl -fsS "http://${{ secrets.SERVER_IP }}:3001/"

      - name: Verify Chromium in backend container
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd ~/DevicePurchased--Project/backend &&
          docker-compose exec -T backend sh -c 'test -x /usr/bin/chromium-browser && echo Chromium OK || (test -x /usr/bin/chromium && echo Chromium OK || exit 1)'
          "
