networks:
  devicePurcahsedNet:
    external: true

volumes:
  npm_data:
  npm_letsencrypt:

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_manager
    restart: always
    ports:
      - "80:80"      # HTTP
      - "81:81"      # Admin Panel
      - "443:443"    # HTTPS
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - devicePurcahsedNet