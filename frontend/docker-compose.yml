networks:
  devicePurcahsedNet:
    external: true

services:
  frontend:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Optional override. Leave unset to use same-origin /api at runtime (nginx proxies below).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: purchase_dashboard_frontend
    restart: always
    ports:
      - "3001:80"
    networks:
      - devicePurcahsedNet
