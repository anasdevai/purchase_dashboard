networks:
  devicePurcahsedNet:
    external: true

services:
  postgres:
    image: postgres:16
    container_name: purchase_dashboard_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-purchase_dashboard}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-purchase_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devicePurcahsedNet

volumes:
  postgres_data:
